*{box-sizing:border-box}

body{
  margin:0;

  padding:14px;
  overflow-x:hidden;
}

body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);
  background-size:34px 34px;
  animation:gridMove 12s linear infinite;
}

@keyframes gridMove{
  from{background-position:0 0}
  to{background-position:34px 34px}
}

.container{
  max-width:660px;
  margin:auto;
  position:relative;
  z-index:1;
}

h1{
  font-size:30px;
  margin:18px 0 14px;
  font-weight:900;
  text-shadow:
    0 0 10px #00e5ff,
    0 0 22px #00e5ff,
    4px 4px 0 #000;
}

.card{
  background:linear-gradient(180deg,rgba(18,22,50,.92),rgba(4,7,18,.94));
  border:1px solid rgba(255,255,255,.24);
  border-radius:30px;
  padding:20px;
  box-shadow:
    0 0 28px rgba(0,229,255,.25),
    0 0 70px rgba(255,0,140,.14),
    0 20px 45px rgba(0,0,0,.65);
  backdrop-filter:blur(10px);
}

.title{
  font-size:20px;
  font-weight:900;
  margin-bottom:12px;
  text-shadow:0 0 12px #00e5ff,3px 3px 0 #000;
}

.note{
  font-size:18px;
  line-height:1.6;
}

button{
  width:100%;
  margin:10px 0;
  padding:19px 14px;
  border:none;
  border-radius:22px;
  font-size:23px;
  font-weight:900;
  color:#fff;
  background:linear-gradient(135deg,#ff512f,#dd2476 55%,#7f00ff);
  box-shadow:0 8px 0 #5c1237,0 0 22px rgba(255,61,119,.38);
  text-shadow:2px 2px 0 #000;
}

button:active{
  transform:translateY(6px) scale(.98);
  box-shadow:0 2px 0 #5c1237;
}

.subBtn{
  background:linear-gradient(135deg,#00c6ff,#0072ff,#6a11cb);
  box-shadow:0 8px 0 #003d82;
}

.choice{
  font-size:32px;
  padding:36px 12px;
  border-radius:28px;
  background:linear-gradient(135deg,#ffb300,#ff3d77,#7f00ff);
}

#scoreArea{
  display:grid;

  gap:9px;
  margin:14px 0;
  font-size:18px;
  font-weight:900;
}

.scoreBox{
  background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.06));
  border:1px solid rgba(255,255,255,.2);
  border-radius:18px;

#questionText{

  font-weight:900;
  margin:20px 0;
  text-shadow:0 0 12px #00e5ff,3px 3px 0 #000;
}

#message{

  font-weight:900;
  min-height:98px;
  line-height:1.5;
  margin-top:10px;

.hidden{display:none}

.badge{

function buildQuestions(){
  const out=[];
  for(let i=0;i<RAW.length;i++){
    for(let j=i+1;j<RAW.length;j++){
      const x=RAW[i],y=RAW[j];
      if(x.g!==y.g||x.type!==y.type||x.val===y.val) continue;
      out.push({
        g:x.g,
        type:x.type,
        d:harder(x.d,y.d),
        a:x.name,
        av:x.val,
        b:y.name,
        bv:y.val
      });
    }
  }
  return out;
}

function harder(a,b){
  const r={easy:1,normal:2,hard:3};
  return r[a]>=r[b]?a:b;
}

const QUESTIONS=buildQuestions();

function selectGenre(g){
  selectedGenre=g;
  $("menu").classList.add("hidden");
  $("rankingScreen").classList.add("hidden");
  $("difficultyMenu").classList.remove("hidden");
  $("selectedGenreBadge").innerText=genreNames[g];
  $("questionCountBadge").innerText="問題数: "+countGenre(g)+"問";
}

function countGenre(g){
  return g==="all"?QUESTIONS.length:QUESTIONS.filter(q=>q.g===g).length;
}

function startGame(d){
  selectedDifficulty=d;
  gameScore=0;
  gameCombo=0;
  lifeCount=3;
  levelNum=1;

  const rank={easy:1,normal:2,hard:3};

  currentQuestions=QUESTIONS.filter(q=>
    (selectedGenre==="all"||q.g===selectedGenre) && rank[q.d]<=rank[d]
  );

  questionPool=[...currentQuestions];
  shuffle(questionPool);

  $("difficultyMenu").classList.add("hidden");
  $("gameScreen").classList.remove("hidden");
  $("gameInfo").innerText=genreNames[selectedGenre]+" / "+difficultyNames[d]+" / "+currentQuestions.length+"問";

  updateAll();
  nextQuestion();
}

function nextQuestion(){
  clearInterval(timerInterval);

  if(questionPool.length===0){
    questionPool=[...currentQuestions];
    shuffle(questionPool);
  }

  current=questionPool.pop();

  if(Math.random()<0.5){
    current.topText=current.a;
    current.bottomText=current.b;
    current.topVal=current.av;
    current.bottomVal=current.bv;
  }else{
    current.topText=current.b;
    current.bottomText=current.a;
    current.topVal=current.bv;
    current.bottomVal=current.av;
  }

  $("questionText").innerText=TYPE[current.type].q;
  $("choiceA").innerText=current.topText;
  $("choiceB").innerText=current.bottomText;
  $("message").innerText="";
  startTimer();
}

function startTimer(){
  clearInterval(timerInterval);

  let base=selectedDifficulty==="easy"?15:selectedDifficulty==="normal"?10:7;
  timeLeft=base;

  $("timer").innerText="残り: "+timeLeft.toFixed(1);

  timerInterval=setInterval(()=>{
    timeLeft-=0.1;
    if(timeLeft<=0){
      clearInterval(timerInterval);
      $("timer").innerText="残り: 0.0";
      loseLife("時間切れ！");
      return;
    }
    $("timer").innerText="残り: "+timeLeft.toFixed(1);
  },100);
}

function answer(choice){
  clearInterval(timerInterval);

  const t=TYPE[current.type];
  const topWins=t.big?current.topVal>current.bottomVal:current.topVal<current.bottomVal;
  const bottomWins=t.big?current.bottomVal>current.topVal:current.bottomVal<current.topVal;
  const correct=topWins?0:bottomWins?1:choice;

  if(choice===correct){
    beep("ok");
    flash("ok");
    gameScore++;
    gameCombo++;

    const newLevel=Math.floor(gameScore/10)+1;
    if(newLevel>levelNum){
      levelNum=newLevel;
      showFloating("LEVEL UP!!");
    }

    if(gameScore>highScore){
      highScore=gameScore;
      localStorage.setItem("whichDXHighScoreUltra2",highScore);
    }

    updateAll();
    showCombo();

    $("message").innerHTML="正解！<br>"+answerText();
    setTimeout(nextQuestion,1050);
  }else{
    loseLife("不正解！");
  }
}

function answerText(){
  const u=TYPE[current.type].unit||"";
  return current.topText+"："+current.topVal+u+"<br>"+current.bottomText+"："+current.bottomVal+u;
}

function loseLife(text){
  clearInterval(timerInterval);
  beep("ng");
  flash("ng");

  lifeCount--;
  gameCombo=0;
  updateAll();

  $("message").innerHTML=text+"<br>"+answerText()+"<br>残りライフ："+lifeCount;

  if(lifeCount>0){
    setTimeout(nextQuestion,1500);
  }else{
    setTimeout(()=>{
      saveRanking();
      alert("ゲームオーバー！\nスコア: "+gameScore+"\n最高スコア: "+highScore);
      backToGenre();
    },1400);
  }
}

function updateAll(){
  $("score").innerText="スコア: "+gameScore;
  $("combo").innerText="連続: "+gameCombo;
  $("highScore").innerText="最高: "+highScore;
  $("level").innerText="LV: "+levelNum;
  $("livesDisplay").innerText="残り: "+"❤️".repeat(lifeCount);
}

function backToGenre(){
  clearInterval(timerInterval);
  $("gameScreen").classList.add("hidden");
  $("difficultyMenu").classList.add("hidden");
  $("rankingScreen").classList.add("hidden");
  $("menu").classList.remove("hidden");
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

function showFloating(text){
  const div=document.createElement("div");
  div.innerText=text;
  div.style.position="fixed";
  div.style.top="32%";
  div.style.left="50%";
  div.style.transform="translate(-50%,-50%)";
  div.style.fontSize="42px";
  div.style.fontWeight="900";
  div.style.color="#fff";
  div.style.zIndex="9999";
  div.style.textShadow="0 0 18px #00e5ff,4px 4px 0 #000";
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),900);
}

function showCombo(){
  if(gameCombo>=5){
    showFloating("🔥 "+gameCombo+" COMBO!!");
  }
}

function flash(type){
  const old=document.body.style.background;
  document.body.style.background=type==="ok"
    ?"linear-gradient(135deg,#00ff87,#60efff)"
    :"linear-gradient(135deg,#ff1744,#300)";
  setTimeout(()=>{document.body.style.background=old;},160);
}

function getAudioCtx(){
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  }
  return audioCtx;
}

function playTone(freq,duration,volume,type="sine"){
  const c=getAudioCtx();
  const o=c.createOscillator();
  const g=c.createGain();
  o.type=type;
  o.connect(g);
  g.connect(c.destination);
  o.frequency.value=freq;
  g.gain.setValueAtTime(0,c.currentTime);
  g.gain.linearRampToValueAtTime(volume,c.currentTime+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+duration/1000);
  o.start();
  setTimeout(()=>o.stop(),duration);
}

function beep(type){
  if(type==="ok"){
    playTone(660,120,.07,"sine");
    setTimeout(()=>playTone(880,140,.06,"sine"),90);
  }else{
    playTone(180,260,.08,"triangle");
  }
}

function toggleBgm(){
  getAudioCtx();

  if(bgmOn){
    clearInterval(bgmTimer);
    bgmOn=false;
    return;
  }

  bgmOn=true;
  bgmStep=0;

  const melody=[392,440,523,440,392,330,349,392];
  const bass=[196,196,220,220,174,174,196,196];

  bgmTimer=setInterval(()=>{
    if(!bgmOn)return;

    const m=melody[bgmStep%melody.length];
    const b=bass[bgmStep%bass.length];

    playTone(b,180,.025,"sine");
    playTone(m,140,.022,"sine");

    bgmStep++;
  },260);
}

function getRanking(){
  return JSON.parse(localStorage.getItem("whichDXRankingUltra2")||"[]");
}

function saveRanking(){
  if(gameScore<=0)return;

  let name=prompt("ランキングに名前を入れてね", "PLAYER");
  if(!name)name="PLAYER";

  const ranking=getRanking();

  ranking.push({
    name:name,
    score:gameScore,
    genre:genreNames[selectedGenre],
    difficulty:difficultyNames[selectedDifficulty],
    date:new Date().toLocaleDateString()
  });

  ranking.sort((a,b)=>b.score-a.score);

  localStorage.setItem("whichDXRankingUltra2",JSON.stringify(ranking.slice(0,10)));
}

function showRanking(){
  $("menu").classList.add("hidden");
  $("difficultyMenu").classList.add("hidden");
  $("gameScreen").classList.add("hidden");
  $("rankingScreen").classList.remove("hidden");

  const ranking=getRanking();
  const box=$("rankingList");

  if(ranking.length===0){
    box.innerHTML="<div class='rankRow'>まだ記録なし</div>";
    return;
  }

  box.innerHTML=ranking.map((r,i)=>`
    <div class="rankRow">
      ${i+1}位　${r.name}<br>
      スコア：${r.score}<br>
      ${r.genre} / ${r.difficulty}<br>
      ${r.date}
    </div>
  `).join("");
}

function clearRanking(){
  if(confirm("ランキングを削除する？")){
    localStorage.removeItem("whichDXRankingUltra2");
    showRanking();
  }
}
